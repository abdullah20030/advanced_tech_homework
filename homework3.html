<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حاسبة الواجب</title>
    <!-- ربط مكتبة بوتستراب لتنسيق الواجهة -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card mx-auto shadow-sm" style="max-width: 450px;">
        <div class="card-body">
            <h4 class="text-center mb-4">الآلة الحاسبة</h4>
            
            <div class="row mb-3">
                <div class="col-4">
                    <input type="number" id="n1" class="form-control" placeholder="الرقم 1">
                </div>
                <div class="col-4">
                    <input type="number" id="n2" class="form-control" placeholder="الرقم 2">
                </div>
                <div class="col-4">
                    <input type="text" id="res" class="form-control" placeholder="النتيجة" readonly>
                </div>
            </div>

            <div class="d-grid gap-2">
                <button onclick="doCalc('+')" class="btn btn-primary">ADD (جمع)</button>
                <button onclick="doCalc('*')" class="btn btn-success">Multiply (ضرب)</button>
                <button onclick="doCalc('max')" class="btn btn-warning">MAX (الأكبر)</button>
                <button onclick="doCalc('avg')" class="btn btn-info text-white">Average (المتوسط)</button>
            </div>
        </div>
    </div>
</div>

<script>
    function doCalc(op) {
        // سحب القيم من المدخلات
        let v1 = parseFloat(document.getElementById('n1').value);
        let v2 = parseFloat(document.getElementById('n2').value);
        let output = document.getElementById('res');

        if (isNaN(v1) || isNaN(v2)) {
            alert("أدخل أرقاماً أولاً");
            return;
        }

        // تنفيذ العملية المطلوبة بناءً على الزر
        if (op === '+') output.value = v1 + v2;
        else if (op === '*') output.value = v1 * v2;
        else if (op === 'max') output.value = Math.max(v1, v2);
        else if (op === 'avg') output.value = (v1 + v2) / 2;
    }
</script>

</body>
</html>
